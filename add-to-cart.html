<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" rel="stylesheet">
    <style>
        /* Basic styling for cart */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f8f8;
            color: black;
            margin: 0;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: white;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .cart-item h4 {
            margin: 0;
        }

        .cart-item p {
            margin: 0;
        }

        .cart-item button {
            background-color: #ad5e46;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-item button:hover {
            background-color: #d1a67d;
        }

        .cart-summary {
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h2>Your Shopping Cart</h2>
    <div id="cart-items"></div>

    <div class="cart-summary">
        <p><strong>Total Items:</strong> <span id="total-items">0</span></p>
        <p><strong>Total Price:</strong> $<span id="total-price">0.00</span></p>
        <button>Proceed to Checkout</button>
    </div>

    <script>
        // Load cart from localStorage
        const cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateCartPage() {
            const cartItemsContainer = document.getElementById('cart-items');
            const totalItems = document.getElementById('total-items');
            const totalPrice = document.getElementById('total-price');

            cartItemsContainer.innerHTML = ''; // Clear current cart items
            let totalQuantity = 0;
            let totalCost = 0;

            // Display cart items
            cart.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.classList.add('cart-item');
                itemDiv.innerHTML = `
                    <div>
                        <h4>${item.productName}</h4>
                        <p>Price: $${item.productPrice}</p>
                        <p>Quantity: ${item.quantity}</p>
                    </div>
                    <div>
                        <button onclick="removeFromCart('${item.productId}')">Remove</button>
                    </div>
                `;
                cartItemsContainer.appendChild(itemDiv);

                totalQuantity += item.quantity;
                totalCost += item.productPrice * item.quantity;
            });

            // Update total items and price
            totalItems.textContent = totalQuantity;
            totalPrice.textContent = totalCost.toFixed(2);
        }

        // Remove item from cart
        function removeFromCart(productId) {
            const updatedCart = cart.filter(item => item.productId !== productId);
            localStorage.setItem('cart', JSON.stringify(updatedCart));
            updateCartPage(); // Re-render cart
        }

        // Call update function to display cart content
        updateCartPage();
    </script>
</body>

</html>
