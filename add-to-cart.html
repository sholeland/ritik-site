<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #000;
    color: white;
    margin: 0;
    padding: 0;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background-color: #111;
}

.cart-icon {
    font-size: 24px;
}

main {
    padding: 20px;
}

.cart-item {
    display: flex;
    align-items: center;
    border-bottom: 1px solid #333;
    padding: 15px 0;
}

.cart-item img {
    width: 80px;
    height: 80px;
    margin-right: 20px;
}

.item-details {
    flex-grow: 1;
}

.price {
    font-weight: bold;
}

input[type="number"] {
    width: 50px;
    padding: 5px;
}

.subtotal {
    font-size: 20px;
    margin-top: 20px;
}

.place-order {
    background-color: #ff007f;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    background-color: #111;
}

footer input {
    padding: 8px;
    margin-right: 10px;
}
    </style>
</head>
<body>
    
    <main>
        <h2>Your cart</h2>
        
        <div class="cart-item">
            <img src="black-earbuds.jpg" alt="Air Pro 2 Black">
            <div class="item-details">
                <h3>Air Pro 2nd Generation Black Edition</h3>
                <p>MagSafe Wireless Charging Case | Free Silicon Cover | 100% Warranty</p>
                <p class="price">Rs. 1,799.99</p>
                <input type="number" value="1" min="1">
            </div>
        </div>

        <div class="cart-item">
            <img src="white-earbuds.jpg" alt="Air Pro 2 ANC">
            <div class="item-details">
                <h3>Air Pro 2nd Generation ANC (Type-C)</h3>
                <p>Free 5000mAh MagSafe Powerbank | 100% Warranty</p>
                <p class="price">Rs. 2,999.98</p>
                <input type="number" value="2" min="1">
            </div>
        </div>

        <div class="subtotal">
            <p>Subtotal: <span id="subtotal-price">Rs. 4,799.98</span></p>
        </div>

        <button class="place-order">Place Order</button>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
    let quantityInputs = document.querySelectorAll("input[type='number']");
    let subtotalPrice = document.getElementById("subtotal-price");

    function updateSubtotal() {
        let total = 1799.99 * quantityInputs[0].value + 1499.99 * quantityInputs[1].value;
        subtotalPrice.textContent = "Rs. " + total.toFixed(2);
    }

    quantityInputs.forEach(input => {
        input.addEventListener("change", updateSubtotal);
    });

    updateSubtotal();
});
    </script>
</body>
</html>
